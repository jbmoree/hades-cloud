name: HADES Cloud Deploy

#on:
#  workflow_dispatch:

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:

    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: hades-cloud

    steps:

      - name: Checkout hades-cloud repository
        uses: actions/checkout@v4

      - name: Checkout private HADES engine
        uses: actions/checkout@v4
        with:
          repository: jbmoree/hades
          token: ${{ secrets.HADES_REPO_TOKEN }}
          path: hades

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify repository layout
        run: |
          pwd
          ls -R

      - name: Build Docker image
        run: |
          docker build \
            -t hades \
            -f hades_batch_runner/Dockerfile .

      - name: Tag Docker image
        run: |
          docker tag hades:latest \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

      - name: Push Docker image
        run: |
          docker push \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest